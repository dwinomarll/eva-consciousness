name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  maat-mcp:
    name: Ma'at MCP build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: templates/shared/maat-mcp/package-lock.json

      - name: Install Ma'at MCP dependencies
        working-directory: templates/shared/maat-mcp
        run: npm ci

      - name: Build Ma'at MCP
        working-directory: templates/shared/maat-mcp
        run: npm run build

  verify-templates:
    name: Verify templates (spawn + install + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Spawn + install + type-check the templates
        run: npm run verify:templates

  python-tests:
    name: Python template tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python deps
        run: pip install fastapi httpx pytest anthropic python-dotenv pydantic "mcp>=1.2.0" uvicorn

      - name: Run pytest
        working-directory: templates/python
        run: python -m pytest -q

  shellcheck:
    name: Shellcheck setup scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        # severity=warning so info-level notes (e.g. unfollowable `source`
        # of the nvm script) don't fail the build, while real bugs do.
        run: shellcheck --severity=warning scripts/setup-mac.sh scripts/setup-linux.sh
